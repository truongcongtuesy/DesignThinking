<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <div class="tab">
            <input type="radio" name="tabs" id="overview" checked>
            <label class="tab" for="overview">Overview</label>
            <div class="content">
            <div class="title"><img src="images/Energy Project Logo.png" alt="logo"></div>
            <div class="timescale">
                <button class="daily">Daily</button>
                <button class="weekly">Weekly</button>
                <button class="montly">Monthly</button>
                <button class="yearly">Yearly</button>
            </div>
            <div class="graph-title">Energy and Water Usage Summary</div>

            <div class="legend">
                <div class="title">Legend: </div>
                <div class="energy-color-label">Energy</div>
                <div class="energy-color-code"></div><br>
                <div class="water-color-label">Water</div>
                <div class="water-color-code"></div>
            </div>

            <div class="graph">
            <div class="monday">Mon</div>
                <div class="bar1"></div>
                <div class="waterbar1"></div>
            <div class="tuesday">Tues</div>
                <div class="bar2"></div>
                <div class="waterbar2"></div>
            <div class="wednesday">Wed</div>
                <div class="bar3"></div>
                <div class="waterbar3"></div>
            <div class="thursday">Thur</div>
                <div class="bar4"></div>
                <div class="waterbar4"></div>
            <div class="friday">Fri</div>
                <div class="bar5"></div>
                <div class="waterbar5"></div>
            <div class="saturday">Sat</div>
                <div class="bar6"></div>
                <div class="waterbar6"></div>
            <div class="sunday">Sun</div>
                <div class="bar7"></div>
                <div class="waterbar7"></div>
            </div>
        </div>
        </div>
        <div class="tab">
            <input type="radio" name="tabs" id="insight">
            <label class="tab" for="insight">Insight</label>
            <div class="content">
                <div class="title"><img src="images/Energy Project Logo.png" alt="logo"></div>
                <h3 class="chart-title">Usage Breakdown</h3>
                <div class="timescale">
                <button class="daily">Daily</button>
                <button class="weekly">Weekly</button>
                <button class="montly">Monthly</button>
                <button class="yearly">Yearly</button>
                </div>
                <div class="pie-chart">
                    <div id="aircon">Air Conditioner</div>
                    <div id="water-heat">Water Heater</div>
                    <div id="fridge">Refridgerator</div>
                    <div id="laundry">Laundry</div>
                    <div id="other">Others</div>
                </div>
                <div class="pie-legend">
                <div class="title">Usage Info: </div>
                <div class="aircon">Air Conditioner 42%</div>
                <div id="aircon-color"></div>
                <div class="waterheat">Water Heater 28%</div>
                <div id="waterheat-color"></div>
                <div class="fridge">Refrigerator 12%</div>
                <div id="fridge-color"></div>
                <div class="laundry">Laundry 10%</div>
                <div id="laundry-color"></div>
                <div class="other">Others 8%</div>
                <div id="other-color"></div>
                </div>
            </div>
        </div>
        <div class="tab">
            <input type="radio" name="tabs" id="tips">
            <label class="tab" for="tips">Tips</label>
            <div class="content"></div>
        </div>
        <div class="tab">
            <input type="radio" name="tabs" id="planner">
            <label class="tab" for="planner">Plan Your Day</label>
            <div class="content"></div>
        </div>
        <div class="tab">
            <input type="radio" name="tabs" id="setting">
            <label class="tab" for="setting">Setting</label>
            <div class="content"></div>
        </div>
        <div class="tab">
            <input type="radio" name="tabs" id="FAQ">
            <label class="tab" for="FAQ">FAQ</label>
            <div class="content"></div>
        </div>
    </div>
    </div>
</body>
</html>
